<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Удача или Неудача — испытай судьбу</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Всплывающее уведомление */
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Header с вкладками */
        header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ccc;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(247, 151, 30, 0.3);
            border-color: transparent;
        }

        /* Контент вкладок с фоновыми картинками */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
            padding: 40px 0 60px;
            border-radius: 32px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        .tab-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 32px;
            z-index: 0;
        }

        .tab-content > * {
            position: relative;
            z-index: 1;
        }

        .tab-content.active {
            display: block;
        }

        #dice16 {
            background-image: url('Pub.png');
        }

        #percent {
            background-image: url('Hunt.jpg');
        }

        #oracle {
            background-image: url('Mystic.jpg');
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
        }

        .game-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .sub {
            color: #ddd;
            margin-bottom: 30px;
        }

        .roll-btn {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            color: #1a1a2e;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 14px 40px;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            margin: 20px 0;
            box-shadow: 0 6px 0 #b45f06;
        }

        .roll-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #b45f06;
        }

        .result {
            font-size: 3rem;
            font-weight: 800;
            background: rgba(0, 0, 0, 0.7);
            display: inline-block;
            padding: 20px 40px;
            border-radius: 80px;
            margin: 20px 0;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .history {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #ddd;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .history span {
            color: #ffd966;
            font-weight: bold;
        }

        @keyframes shakeRoll {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(30deg) scale(1.1); }
            40% { transform: rotate(-30deg) scale(1.1); }
            60% { transform: rotate(15deg) scale(1.05); }
            80% { transform: rotate(-15deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .dice-rolling {
            animation: shakeRoll 0.4s ease-in-out;
        }

        .magic-ball {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle at 30% 30%, #2a0a3a, #0a0015);
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(128, 0, 255, 0.3), inset 0 -10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.1s transform;
            position: relative;
        }

        .magic-ball:active {
            transform: scale(0.97);
        }

        @keyframes purpleGlow {
            0% { box-shadow: 0 0 20px rgba(156, 39, 176, 0.4), inset 0 0 10px rgba(156, 39, 176, 0.2); }
            25% { box-shadow: 0 0 60px rgba(156, 39, 176, 0.9), inset 0 0 25px rgba(156, 39, 176, 0.5); }
            50% { box-shadow: 0 0 100px rgba(156, 39, 176, 1), inset 0 0 40px rgba(156, 39, 176, 0.8); }
            75% { box-shadow: 0 0 60px rgba(156, 39, 176, 0.9), inset 0 0 25px rgba(156, 39, 176, 0.5); }
            100% { box-shadow: 0 0 20px rgba(156, 39, 176, 0.4), inset 0 0 10px rgba(156, 39, 176, 0.2); }
        }

        .magic-active {
            animation: purpleGlow 0.6s ease-out;
        }

        .ball-answer {
            background: #1a1a2e;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #d4af37;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3), 0 0 10px rgba(212, 175, 55, 0.3);
            font-family: monospace;
            transition: all 0.2s;
        }

        @keyframes answerGlow {
            0% { text-shadow: 0 0 5px #ff00ff, color: #d4af37; background: #1a1a2e; }
            50% { text-shadow: 0 0 25px #ff00ff, 0 0 10px #aa00ff; color: #ffffff; background: #2a0a5a; }
            100% { text-shadow: 0 0 5px #ff00ff, color: #d4af37; background: #1a1a2e; }
        }

        .answer-magic-glow {
            animation: answerGlow 0.5s ease-out;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 20px;
            color: #888;
            font-size: 0.8rem;
        }

        @media (max-width: 650px) {
            .tab-btn { padding: 8px 18px; font-size: 0.9rem; }
            .result { font-size: 2rem; padding: 12px 24px; }
            .game-card { padding: 30px 20px; }
            h2 { font-size: 1.6rem; }
            .magic-ball { width: 170px; height: 170px; }
            .ball-answer { width: 75px; height: 75px; font-size: 1.4rem; }
            .toast-notification { font-size: 1rem; padding: 10px 20px; white-space: nowrap; }
        }
    </style>
</head>
<body>

<!-- Всплывающее уведомление -->
<div id="toastNotification" class="toast-notification"></div>

<header>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="dice16">🎲 КУБИК 1d16</button>
            <button class="tab-btn" data-tab="percent">🎯 СЛУЧАЙ 1–100</button>
            <button class="tab-btn" data-tab="oracle">🔮 МАГИЧЕСКИЙ ШАР</button>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div id="dice16" class="tab-content active">
            <div class="game-card">
                <div class="game-icon">🎲⚡</div>
                <h2>Бросок судьбы 1d16</h2>
                <div class="sub">Нажми на кубик — узнай число от 1 до 16</div>
                <button class="roll-btn" id="rollD16Btn">🎲 БРОСИТЬ КУБИК</button>
                <div class="result" id="d16Result">—</div>
                <div class="history">📜 Последний бросок: <span id="lastD16">—</span></div>
            </div>
        </div>

        <div id="percent" class="tab-content">
            <div class="game-card">
                <div class="game-icon">🎯✨</div>
                <h2>Генератор 1 — 100</h2>
                <div class="sub">Случайное число от 1 до 100</div>
                <button class="roll-btn" id="rollPercentBtn">🌀 ПОЛУЧИТЬ ЧИСЛО</button>
                <div class="result" id="percentResult">—</div>
                <div class="history">📜 Предыдущее значение: <span id="lastPercent">—</span></div>
            </div>
        </div>

        <div id="oracle" class="tab-content">
            <div class="game-card">
                <div class="game-icon">🔮⭐</div>
                <h2>Магический шар</h2>
                <div class="sub">Коснись шара — он ответит Да или Нет</div>
                <div class="magic-ball" id="magicBall">
                    <div class="ball-answer" id="ballAnswer">?</div>
                </div>
                <div class="history">📜 Последний ответ: <span id="lastOracle">—</span></div>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <p>🎲 Удача или Неудача? Судьба в твоих руках.</p>
    </div>
</footer>

<script>
    // Функция показа всплывающего уведомления
    function showToast(message) {
        const toast = document.getElementById('toastNotification');
        toast.textContent = message;
        toast.classList.remove('show');
        // Форсируем реflow для перезапуска анимации
        void toast.offsetWidth;
        toast.classList.add('show');
        
        // Скрываем через 2 секунды
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2000);
    }

    // === 1) Кубик 1d16 ===
    const d16Btn = document.getElementById('rollD16Btn');
    const d16Result = document.getElementById('d16Result');
    const lastD16 = document.getElementById('lastD16');

    d16Btn.addEventListener('click', () => {
        d16Btn.classList.add('dice-rolling');
        d16Result.style.opacity = '0.5';
        
        setTimeout(() => {
            const value = Math.floor(Math.random() * 16) + 1;
            d16Result.textContent = value;
            lastD16.textContent = value;
            d16Result.style.opacity = '1';
            d16Result.style.transform = 'scale(1.1)';
            setTimeout(() => { d16Result.style.transform = 'scale(1)'; }, 150);
        }, 200);
        
        setTimeout(() => {
            d16Btn.classList.remove('dice-rolling');
        }, 500);
    });

    // === 2) Генератор от 1 до 100 ===
    const percentBtn = document.getElementById('rollPercentBtn');
    const percentResult = document.getElementById('percentResult');
    const lastPercent = document.getElementById('lastPercent');

    percentBtn.addEventListener('click', () => {
        const value = Math.floor(Math.random() * 100) + 1;
        percentResult.textContent = value;
        lastPercent.textContent = value;
        percentResult.style.transform = 'scale(1.1)';
        setTimeout(() => { percentResult.style.transform = 'scale(1)'; }, 150);
    });

    // === 3) Магический шар с всплывающим окном ===
    const magicBallDiv = document.getElementById('magicBall');
    const ballAnswer = document.getElementById('ballAnswer');
    const lastOracle = document.getElementById('lastOracle');

    function getRandomYesNo() {
        return Math.random() < 0.5 ? "ДА" : "НЕТ";
    }

    // Функция получения текста для всплывающего окна в зависимости от ответа
    function getToastMessage(answer) {
        if (answer === "ДА") {
            return "✨ Кирилл — тебя ебёт отчим! ✨";
        } else {
            return "🌙 Кириллу сын выблядка 🌙";
        }
    }

    magicBallDiv.addEventListener('click', () => {
        // Анимации шара
        magicBallDiv.classList.remove('magic-active');
        ballAnswer.classList.remove('answer-magic-glow');
        
        void magicBallDiv.offsetWidth;
        void ballAnswer.offsetWidth;
        
        magicBallDiv.classList.add('magic-active');
        
        const answer = getRandomYesNo();
        
        setTimeout(() => {
            ballAnswer.textContent = answer;
            lastOracle.textContent = answer;
            ballAnswer.classList.add('answer-magic-glow');
            ballAnswer.style.transform = 'scale(1.2)';
            setTimeout(() => { ballAnswer.style.transform = 'scale(1)'; }, 200);
            
            // ПОКАЗЫВАЕМ ВСПЛЫВАЮЩЕЕ ОКНО с текстом для Кирилла
            const toastMessage = getToastMessage(answer);
            showToast(toastMessage);
        }, 100);
        
        // Вибрация шара
        magicBallDiv.style.transform = 'rotate(3deg) scale(0.98)';
        setTimeout(() => { magicBallDiv.style.transform = 'rotate(-3deg) scale(0.98)'; }, 50);
        setTimeout(() => { magicBallDiv.style.transform = 'rotate(0deg) scale(1)'; }, 150);
        
        setTimeout(() => {
            magicBallDiv.classList.remove('magic-active');
        }, 700);
    });

    // Переключение вкладок
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            
            tabBtns.forEach(b => b.classList.remove('active'));
            tabContents.forEach(content => content.classList.remove('active'));
            
            btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        });
    });
</script>
</body>
</html>
