<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GregVidCards — магазин видеокарт, процессоров и БП</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #eee;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Шапка с логотипом */
        header {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 5px;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo-crown {
            font-size: 2rem;
        }

        .logo-text {
            letter-spacing: 2px;
        }

        /* Кнопки входа/регистрации */
        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .auth-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .auth-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.02);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 215, 0, 0.1);
            padding: 6px 18px;
            border-radius: 40px;
        }

        .user-name {
            color: #ffd700;
            font-weight: 600;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px 0;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #ccc;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        /* Контент вкладок */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
            padding: 30px 0 50px;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e1e2e;
            border-radius: 24px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .modal-content h3 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2a3e;
            border: 1px solid #3a3a4e;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .close-modal {
            background: none;
            color: #ff6b6b;
            margin-top: 10px;
        }

        /* Категории товаров */
        .category-section {
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 1.6rem;
            margin-bottom: 20px;
            color: #ffd700;
            border-left: 4px solid #ffd700;
            padding-left: 16px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .product-image {
            width: 100%;
            height: 180px;
            background: #2a2a3e;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-image-placeholder {
            font-size: 3rem;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .product-price {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: 700;
            margin: 10px 0;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .add-to-cart:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        /* Корзина */
        .cart-items {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cart-total {
            text-align: right;
            font-size: 1.3rem;
            padding: 20px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .pay-btn {
            background: linear-gradient(135deg, #00c853, #00e676);
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* Отзывы */
        .reviews-list {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
        }

        .review-item {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .review-author {
            color: #ffd700;
            font-weight: 600;
        }

        .review-text {
            margin-top: 8px;
            color: #ddd;
        }

        .review-form textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a3e;
            border: 1px solid #3a3a4e;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 15px;
        }

        .submit-review {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 20px;
            color: #888;
        }

        @media (max-width: 700px) {
            .header-content { flex-direction: column; }
            .products-grid { grid-template-columns: 1fr; }
            .tab-btn { padding: 8px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="header-content">
            <div class="logo">
                <span class="logo-crown">👑</span>
                <span class="logo-text">GVC</span>
                <span class="logo-crown">👑</span>
            </div>
            <div id="authSection">
                <!-- динамически меняется через JS -->
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="shop">🛒 МАГАЗИН</button>
        <button class="tab-btn" data-tab="reviews">⭐ ОТЗЫВЫ</button>
        <button class="tab-btn" data-tab="cart">🛍️ КОРЗИНА</button>
    </div>

    <!-- Вкладка Магазин -->
    <div id="shop" class="tab-content active">
        <!-- Видеокарты -->
        <div class="category-section">
            <h2 class="category-title">🎮 ВИДЕОКАРТЫ</h2>
            <div class="products-grid" id="gpuProducts"></div>
        </div>

        <!-- Процессоры -->
        <div class="category-section">
            <h2 class="category-title">⚡ ПРОЦЕССОРЫ</h2>
            <div class="products-grid" id="cpuProducts"></div>
        </div>

        <!-- Блоки питания -->
        <div class="category-section">
            <h2 class="category-title">🔌 БЛОКИ ПИТАНИЯ</h2>
            <div class="products-grid" id="psuProducts"></div>
        </div>
    </div>

    <!-- Вкладка Отзывы -->
    <div id="reviews" class="tab-content">
        <div class="reviews-list" id="reviewsList">
            <div class="review-item">
                <div class="review-author">🛒 Гость</div>
                <div class="review-text">Отличный магазин! RTX 4070 пришла быстро 🔥</div>
            </div>
        </div>
        <div class="review-form">
            <textarea id="reviewText" rows="3" placeholder="Напишите свой отзыв..."></textarea>
            <button class="submit-review" id="submitReviewBtn">✍️ Оставить отзыв</button>
        </div>
    </div>

    <!-- Вкладка Корзина -->
    <div id="cart" class="tab-content">
        <div id="cartItems" class="cart-items">
            <div style="text-align: center; padding: 40px;">Корзина пуста</div>
        </div>
        <div id="cartTotal" class="cart-total" style="display: none;">Итого: 0 ₽</div>
        <button id="payBtn" class="pay-btn" style="display: none;">💳 Оплатить по карте</button>
    </div>
</div>

<footer>
    <div class="container">
        <p>👑 GregVidCards (GVC) — лучшие комплектующие для твоего ПК</p>
    </div>
</footer>

<!-- Модальное окно регистрации -->
<div id="registerModal" class="modal">
    <div class="modal-content">
        <h3>📝 Регистрация</h3>
        <input type="text" id="regLogin" placeholder="Логин">
        <input type="password" id="regPassword" placeholder="Пароль">
        <button id="registerConfirmBtn">Зарегистрироваться</button>
        <button class="close-modal" onclick="closeRegisterModal()">Отмена</button>
    </div>
</div>

<!-- Модальное окно входа -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <h3>🔐 Вход</h3>
        <input type="text" id="loginLogin" placeholder="Логин">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button id="loginConfirmBtn">Войти</button>
        <button class="close-modal" onclick="closeLoginModal()">Отмена</button>
    </div>
</div>

<!-- Модальное окно оплаты -->
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <h3>💳 Оплата картой</h3>
        <input type="text" placeholder="Номер карты (16 цифр)" maxlength="19">
        <input type="text" placeholder="MM/YY">
        <input type="text" placeholder="CVV" maxlength="3">
        <button id="paymentConfirmBtn">✅ Оплатить</button>
        <button class="close-modal" onclick="closePaymentModal()">Отмена</button>
    </div>
</div>

<script>
    // ========== ТОВАРЫ ==========
    const products = {
        gpu: [
            { id: "rtx4070", name: "RTX 4070", price: 76270, image: "4070.jpg", category: "gpu" },
            { id: "rtx3060ti", name: "RTX 3060 Ti", price: 35000, image: "3060.jpg", category: "gpu" },
            { id: "gtx1080ti", name: "GTX 1080 Ti", price: 22000, image: "1080.jpg", category: "gpu" }
        ],
        cpu: [
            { id: "ryzen7800", name: "AMD Ryzen 7800", price: 48500, image: "7800.jpg", category: "cpu" },
            { id: "ultra7270k", name: "Intel Core Ultra 7 270K", price: 42500, image: "270k.jpg", category: "cpu" },
            { id: "xeon2695", name: "Intel Xeon E5-2695", price: 18500, image: "2695.jpg", category: "cpu" }
        ],
        psu: [
            { id: "m450", name: "M450 (450W)", price: 3290, image: "450W.jpg", category: "psu" },
            { id: "cbr500", name: "CBR-ATX (500W)", price: 4150, image: "500W.jpg", category: "psu" },
            { id: "azerty600", name: "Azerty-RPL (600W)", price: 5290, image: "600W.jpg", category: "psu" }
        ]
    };

    // Цены взяты из поиска: RTX 4070 — 76 270 ₽ [citation:1], 
    // БП 450W ~ 3000-4200₽ [citation:2], для остальных — рыночные аналогии

    // ========== ХРАНИЛИЩЕ ==========
    let currentUser = localStorage.getItem("gvc_user") || null;
    let cart = JSON.parse(localStorage.getItem("gvc_cart") || "[]");
    let reviews = JSON.parse(localStorage.getItem("gvc_reviews") || `[
        {"author": "🛒 Гость", "text": "Отличный магазин! RTX 4070 пришла быстро 🔥"}
    ]`);

    // ========== ФУНКЦИИ СОХРАНЕНИЯ ==========
    function saveCart() {
        localStorage.setItem("gvc_cart", JSON.stringify(cart));
    }

    function saveReviews() {
        localStorage.setItem("gvc_reviews", JSON.stringify(reviews));
    }

    // ========== ОТРИСОВКА ТОВАРОВ ==========
    function renderProducts() {
        // Видеокарты
        const gpuContainer = document.getElementById("gpuProducts");
        gpuContainer.innerHTML = products.gpu.map(p => `
            <div class="product-card">
                <div class="product-image">
                    ${p.image ? `<img src="${p.image}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-image-placeholder\\'>🎮</div>'">` : `<div class="product-image-placeholder">🎮</div>`}
                </div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} ₽</div>
                <button class="add-to-cart" onclick="addToCart('${p.id}')">🛒 В корзину</button>
            </div>
        `).join('');

        // Процессоры
        const cpuContainer = document.getElementById("cpuProducts");
        cpuContainer.innerHTML = products.cpu.map(p => `
            <div class="product-card">
                <div class="product-image">
                    ${p.image ? `<img src="${p.image}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-image-placeholder\\'>⚡</div>'">` : `<div class="product-image-placeholder">⚡</div>`}
                </div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} ₽</div>
                <button class="add-to-cart" onclick="addToCart('${p.id}')">🛒 В корзину</button>
            </div>
        `).join('');

        // БП
        const psuContainer = document.getElementById("psuProducts");
        psuContainer.innerHTML = products.psu.map(p => `
            <div class="product-card">
                <div class="product-image">
                    ${p.image ? `<img src="${p.image}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-image-placeholder\\'>🔌</div>'">` : `<div class="product-image-placeholder">🔌</div>`}
                </div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price.toLocaleString()} ₽</div>
                <button class="add-to-cart" onclick="addToCart('${p.id}')">🛒 В корзину</button>
            </div>
        `).join('');
    }

    // Найти товар по ID
    function findProductById(id) {
        const all = [...products.gpu, ...products.cpu, ...products.psu];
        return all.find(p => p.id === id);
    }

    // Добавить в корзину
    window.addToCart = function(productId) {
        const product = findProductById(productId);
        if (!product) return;
        
        const existing = cart.find(item => item.id === productId);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        saveCart();
        renderCart();
        showToast("✅ " + product.name + " добавлен в корзину");
    };

    // Отрисовать корзину
    function renderCart() {
        const container = document.getElementById("cartItems");
        const totalDiv = document.getElementById("cartTotal");
        const payBtn = document.getElementById("payBtn");
        
        if (cart.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 40px;">🛒 Корзина пуста</div>';
            totalDiv.style.display = "none";
            payBtn.style.display = "none";
            return;
        }
        
        let total = 0;
        container.innerHTML = cart.map(item => {
            const sum = item.price * item.quantity;
            total += sum;
            return `
                <div class="cart-item">
                    <div><strong>${item.name}</strong><br>${item.price.toLocaleString()} ₽ × ${item.quantity}</div>
                    <div>${sum.toLocaleString()} ₽ <button onclick="removeFromCart('${item.id}')" style="background:#ff6b6b; border:none; padding:5px 12px; border-radius:20px; margin-left:10px; cursor:pointer;">🗑️</button></div>
                </div>
            `;
        }).join('');
        
        totalDiv.innerHTML = `💵 Итого: ${total.toLocaleString()} ₽`;
        totalDiv.style.display = "block";
        payBtn.style.display = "block";
    }

    // Удалить из корзины
    window.removeFromCart = function(id) {
        const index = cart.findIndex(item => item.id === id);
        if (index !== -1) {
            if (cart[index].quantity > 1) {
                cart[index].quantity--;
            } else {
                cart.splice(index, 1);
            }
            saveCart();
            renderCart();
        }
    };

    // Отзывы
    function renderReviews() {
        const container = document.getElementById("reviewsList");
        if (reviews.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">Пока нет отзывов. Будьте первым! ⭐</div>';
            return;
        }
        container.innerHTML = reviews.map(r => `
            <div class="review-item">
                <div class="review-author">👤 ${escapeHtml(r.author)}</div>
                <div class="review-text">${escapeHtml(r.text)}</div>
            </div>
        `).join('');
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== АВТОРИЗАЦИЯ ==========
    function updateAuthUI() {
        const authSection = document.getElementById("authSection");
        if (currentUser) {
            authSection.innerHTML = `
                <div class="user-info">
                    <span>👑</span>
                    <span class="user-name">${escapeHtml(currentUser)}</span>
                    <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
                </div>
            `;
        } else {
            authSection.innerHTML = `
                <div class="auth-buttons">
                    <button class="auth-btn" onclick="openRegisterModal()">📝 Регистрация</button>
                    <button class="auth-btn" onclick="openLoginModal()">🔐 Вход</button>
                </div>
            `;
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem("gvc_user");
        updateAuthUI();
        showToast("👋 Вы вышли из аккаунта");
    }

    // Модалки регистрации
    function openRegisterModal() {
        document.getElementById("registerModal").classList.add("active");
    }
    function closeRegisterModal() {
        document.getElementById("registerModal").classList.remove("active");
    }
    function openLoginModal() {
        document.getElementById("loginModal").classList.add("active");
    }
    function closeLoginModal() {
        document.getElementById("loginModal").classList.remove("active");
    }
    function closePaymentModal() {
        document.getElementById("paymentModal").classList.remove("active");
    }

    function register() {
        const login = document.getElementById("regLogin").value.trim();
        const password = document.getElementById("regPassword").value;
        if (!login || !password) {
            showToast("❌ Заполните все поля");
            return;
        }
        const users = JSON.parse(localStorage.getItem("gvc_users") || "{}");
        if (users[login]) {
            showToast("❌ Пользователь уже существует");
            return;
        }
        users[login] = password;
        localStorage.setItem("gvc_users", JSON.stringify(users));
        currentUser = login;
        localStorage.setItem("gvc_user", currentUser);
        updateAuthUI();
        closeRegisterModal();
        showToast("✅ Регистрация успешна! Добро пожаловать, " + login);
        document.getElementById("regLogin").value = "";
        document.getElementById("regPassword").value = "";
    }

    function login() {
        const login = document.getElementById("loginLogin").value.trim();
        const password = document.getElementById("loginPassword").value;
        const users = JSON.parse(localStorage.getItem("gvc_users") || "{}");
        if (users[login] && users[login] === password) {
            currentUser = login;
            localStorage.setItem("gvc_user", currentUser);
            updateAuthUI();
            closeLoginModal();
            showToast("🔓 Добро пожаловать, " + login);
        } else {
            showToast("❌ Неверный логин или пароль");
        }
        document.getElementById("loginLogin").value = "";
        document.getElementById("loginPassword").value = "";
    }

    // ========== ОПЛАТА ==========
    function openPaymentModal() {
        if (!currentUser) {
            showToast("🔐 Сначала войдите в аккаунт для оплаты");
            return;
        }
        if (cart.length === 0) {
            showToast("🛒 Корзина пуста");
            return;
        }
        document.getElementById("paymentModal").classList.add("active");
    }

    function processPayment() {
        const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        showToast(`💳 Оплата ${total.toLocaleString()} ₽ прошла успешно! Спасибо за покупку! 🎉`);
        cart = [];
        saveCart();
        renderCart();
        closePaymentModal();
    }

    // Toast уведомление
    function showToast(msg) {
        let toast = document.getElementById("toastNotification");
        if (!toast) {
            toast = document.createElement("div");
            toast.id = "toastNotification";
            toast.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#1a1a2e;padding:12px 24px;border-radius:40px;z-index:2000;font-weight:bold;opacity:0;transition:0.3s;pointer-events:none;";
            document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 2500);
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    document.getElementById("registerConfirmBtn").onclick = register;
    document.getElementById("loginConfirmBtn").onclick = login;
    document.getElementById("paymentConfirmBtn").onclick = processPayment;
    document.getElementById("payBtn").onclick = openPaymentModal;

    document.getElementById("submitReviewBtn").onclick = () => {
        const text = document.getElementById("reviewText").value.trim();
        if (!text) {
            showToast("✏️ Напишите отзыв");
            return;
        }
        const author = currentUser ? currentUser : "🛒 Гость";
        reviews.unshift({ author: author, text: text });
        saveReviews();
        renderReviews();
        document.getElementById("reviewText").value = "";
        showToast("⭐ Спасибо за отзыв!");
    };

    // Переключение вкладок
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById(btn.dataset.tab).classList.add("active");
        };
    });

    renderProducts();
    renderCart();
    renderReviews();
    updateAuthUI();
</script>
</body>
</html>
